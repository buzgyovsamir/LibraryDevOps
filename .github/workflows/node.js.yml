# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Build, test and deploy

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Use Node.js 24
      uses: actions/setup-node@v4
      with:
        node-version: 24
        cache: 'npm'

    - name: Install npm dependencies
      run: npm install
    
    - name: Start backend
      run: npm run start-be &

      
    - name: Start frontend
      run: npm run start-fe &

    - name: Install Playwright Browsers
      run: npx playwright install

    - name: Manually change the config file
      run: |
        echo "export const settings = { host: 'http://localhost:3030' };" > src/config.js
      
    - name: Start tests
      run: npm test
  

  deploy-be:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: JorgeLNJunior/render-deploy@v1.5.0
        with:
          service_id: ${{ secrets.SERVICE_BE_ID }}
          api_key: ${{ secrets.RENDER_TOKEN }}
          wait_deploy: true

  deploy-fe:
    needs: deploy-be
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: JorgeLNJunior/render-deploy@v1.5.0
        with:
          service_id: ${{ secrets.SERVICE_FE_ID }}
          api_key: ${{ secrets.RENDER_TOKEN }}
          wait_deploy: true

